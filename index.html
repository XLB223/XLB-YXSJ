<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>跨境AI Listing生成器</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-light: #eff6ff;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f8fafc;
      --card: #ffffff;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .header p {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 24px;
      border: 1px solid rgba(229, 231, 235, 0.8);
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group:last-of-type {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    .radio-option input[type="radio"] {
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .lang-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      max-height: 280px;
      overflow-y: auto;
      padding: 4px;
    }

    .lang-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .lang-action-btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      font-size: 0.8rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-action-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .lang-filter-hint {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .history-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .history-chip {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      font-size: 0.8rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .history-chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .history-empty {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .lang-option:has(input:checked) {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .lang-option input[type="checkbox"] {
      accent-color: var(--primary);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .lang-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .lang-tab {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-tab:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .lang-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .lang-panel {
      display: none;
    }

    .lang-panel.active {
      display: block;
    }

    .lang-panel-title {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .btn-generate {
      display: block;
      width: 100%;
      margin-top: 24px;
      padding: 14px 24px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
    }

    .btn-generate:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-generate:active:not(:disabled) {
      transform: scale(0.99);
    }

    .btn-generate:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .results {
      display: none;
    }

    .results.visible {
      display: block;
    }

    .result-block {
      margin-bottom: 24px;
    }

    .result-block:last-child {
      margin-bottom: 0;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .result-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .btn-copy {
      flex-shrink: 0;
      padding: 6px 14px;
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid rgba(37, 99, 235, 0.2);
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-copy:hover {
      background: var(--primary);
      color: #fff;
    }

    .btn-copy.copied {
      background: #dcfce7;
      color: #16a34a;
      border-color: #bbf7d0;
    }

    .result-title {
      font-size: clamp(1.15rem, 3vw, 1.35rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }

    .bullet-list {
      list-style: none;
      padding: 0;
    }

    .bullet-list li {
      position: relative;
      padding-left: 20px;
      margin-bottom: 10px;
      color: var(--text);
    }

    .bullet-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.65em;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
    }

    .result-text {
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .result-html {
      white-space: normal;
    }

    .result-html p {
      margin-bottom: 12px;
    }

    .result-html ul {
      margin: 8px 0 12px 20px;
    }

    .result-html li {
      margin-bottom: 6px;
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .status-bar {
      display: none;
      margin-bottom: 20px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .status-bar.visible {
      display: block;
    }

    .status-bar.error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    .status-bar.ok {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    .status-bar.warn {
      background: #fffbeb;
      color: #b45309;
      border: 1px solid #fde68a;
    }

    @media (max-width: 600px) {
      .page {
        padding: 24px 16px 40px;
      }

      .card {
        padding: 20px 18px;
      }

      .result-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .btn-copy {
        align-self: flex-end;
      }
    }

    /* ?????? */
    .upgrade-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999; justify-content:center; align-items:center; }
    .upgrade-overlay.show { display:flex; }
    .upgrade-modal { background:#fff; border-radius:16px; padding:32px; max-width:420px; width:90%; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3); position:relative; }
    .upgrade-modal h3 { margin:0 0 8px; font-size:22px; color:#1a1a2e; }
    .upgrade-modal .upgrade-icon { font-size:48px; margin-bottom:12px; }
    .upgrade-modal p { color:#666; margin:8px 0 20px; line-height:1.6; }
    .upgrade-modal .upgrade-plan { background:#f0f4ff; border-radius:12px; padding:16px; margin:16px 0; }
    .upgrade-modal .upgrade-price { font-size:28px; font-weight:700; color:#4f46e5; }
    .upgrade-modal .upgrade-price span { font-size:14px; color:#888; font-weight:400; }
    .upgrade-modal .btn-upgrade { display:block; width:100%; padding:14px; background:linear-gradient(135deg,#4f46e5,#7c3aed); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; margin:8px 0; }
    .upgrade-modal .btn-upgrade:hover { opacity:0.9; }
    .upgrade-modal .btn-activate { display:block; width:100%; padding:12px; background:transparent; color:#4f46e5; border:2px solid #4f46e5; border-radius:10px; font-size:14px; font-weight:500; cursor:pointer; margin:4px 0; }
    .upgrade-modal .activate-section { display:none; margin-top:16px; }
    .upgrade-modal .activate-section.show { display:block; }
    .upgrade-modal .activate-input { width:100%; padding:12px; border:2px solid #e0e0e0; border-radius:10px; font-size:15px; text-align:center; margin:8px 0; box-sizing:border-box; }
    .upgrade-modal .activate-input:focus { border-color:#4f46e5; outline:none; }
    .upgrade-modal .btn-submit-activate { width:100%; padding:12px; background:#22c55e; color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }
    .upgrade-modal .btn-close-modal { position:absolute; top:12px; right:16px; background:none; border:none; font-size:24px; cursor:pointer; color:#999; }
    .upgrade-modal .activate-error { color:#ef4444; font-size:13px; margin-top:8px; display:none; }
    .pro-badge { display:none; background:linear-gradient(135deg,#f59e0b,#ef4444); color:#fff; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; margin-left:8px; vertical-align:middle; }
    .usage-info { text-align:center; font-size:13px; color:#888; margin:8px 0; }
    .usage-info .remaining { font-weight:700; color:#4f46e5; }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>跨境AI Listing生成器</h1>
      <p>输入产品信息，一键生成 Amazon 多语言 Listing</p>
        <span class="pro-badge" id="proBadge">PRO</span>
    </header>

    <div class="status-bar" id="statusBar"></div>
    <div class="usage-info" id="usageInfo">?????<span class="remaining" id="remainingCount">3</span> ?</div>

    <section class="card">
      <h2 class="card-title">产品信息</h2>
      <form id="listingForm">
        <div class="form-group">
          <label for="productName">产品名称</label>
          <input
            type="text"
            id="productName"
            list="productNameHistory"
            placeholder="例如：不锈钢厨房剪刀"
            autocomplete="off"
            required
          />
          <datalist id="productNameHistory"></datalist>
        </div>

        <div class="form-group">
          <label for="sellingPoints">产品卖点 / 特点</label>
          <textarea id="sellingPoints" placeholder="例如：锋利耐用、防滑手柄、可拆卸清洗、适合剪肉/蔬菜/包装..." required></textarea>
        </div>

        <div class="form-group">
          <label for="category">产品类型</label>
          <input
            type="text"
            id="category"
            list="categoryHistory"
            placeholder="例如：厨房用品"
            autocomplete="off"
            required
          />
          <datalist id="categoryHistory"></datalist>
          <div class="history-chips" id="historyChips"></div>
        </div>

        <div class="form-group">
          <label id="langSectionLabel">产品语言</label>
          <div class="lang-actions" id="regionFilters">
            <button type="button" class="lang-action-btn active" data-region="全部">全部</button>
            <button type="button" class="lang-action-btn" data-region="亚洲">亚洲</button>
            <button type="button" class="lang-action-btn" data-region="欧洲">欧洲</button>
            <button type="button" class="lang-action-btn" data-region="非洲">非洲</button>
            <button type="button" class="lang-action-btn" data-region="美洲">美洲</button>
          </div>
          <div class="lang-grid" id="langGrid"></div>
        </div>

        <div class="form-group">
          <label>文案风格</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="style" value="professional" checked />
              专业正式
            </label>
            <label class="radio-option">
              <input type="radio" name="style" value="casual" />
              活泼口语化
            </label>
          </div>
        </div>

        <button type="submit" class="btn-generate" id="generateBtn">生成 Listing</button>
      </form>
    </section>

    <section class="card results" id="results">
      <h2 class="card-title">生成结果</h2>
      <div class="lang-tabs" id="langTabs"></div>
      <div id="langPanels"></div>
    </section>

    <footer class="footer">Powered by DeepSeek</footer>
  </div>

  <div class="upgrade-overlay" id="upgradeOverlay">
    <div class="upgrade-modal">
      <button class="btn-close-modal" onclick="closeUpgradeModal()">&times;</button>
      <div class="upgrade-icon">&#x1f680;</div>
      <h3>?????????</h3>
      <p>???? <b>3</b> ???? Pro ????</p>
      <div class="upgrade-plan">
        <div class="upgrade-price">&yen;19.9<span>/?</span></div>
        <div style="color:#888;font-size:13px;">? &yen;99/? &middot; ???? &middot; ???</div>
      </div>
      <button class="btn-upgrade" onclick="goPay()">&#x1f4b3; ???? Pro</button>
      <button class="btn-activate" onclick="showActivateInput()">??????????</button>
      <div class="activate-section" id="activateSection">
        <input class="activate-input" id="activateCodeInput" placeholder="??????" />
        <button class="btn-submit-activate" onclick="activatePro()">&#x2714; ?? Pro</button>
        <div class="activate-error" id="activateError">????????????</div>
      </div>
    </div>
  </div>

  <script>

    let LANG_META = {};
    let selectedLangs = new Set();
    let activeRegion = "全部";
    const regionSelections = {};

    const DAILY_LIMIT = 3;
    const USAGE_KEY = "listing_usage";
    const PRO_KEY = "listing_pro";
    const ACTIVATION_CODES = ["PRO2026", "XLBVIP", "LISTING99"];
    function getToday() { return new Date().toISOString().slice(0,10); }
    function getUsage() { try { const d=JSON.parse(localStorage.getItem(USAGE_KEY)); if(d&&d.date===getToday()) return d.count; }catch(e){} return 0; }
    function addUsage() { const today=getToday(); let d={date:today,count:1}; try{const e=JSON.parse(localStorage.getItem(USAGE_KEY));if(e&&e.date===today)d.count=e.count+1;}catch(e){} localStorage.setItem(USAGE_KEY,JSON.stringify(d)); updateUsageUI(); }
    function isPro() { try{return localStorage.getItem(PRO_KEY)==="true";}catch(e){return false;} }
    function canGenerate() { return isPro() || getUsage() < DAILY_LIMIT; }

    const form = document.getElementById("listingForm");
    const generateBtn = document.getElementById("generateBtn");
    const resultsSection = document.getElementById("results");
    const statusBar = document.getElementById("statusBar");
    const langTabs = document.getElementById("langTabs");
    const langPanels = document.getElementById("langPanels");
    const langGrid = document.getElementById("langGrid");
    const langSectionLabel = document.getElementById("langSectionLabel");

    let currentListings = null;
    let activeLang = null;

    const API_BASE =
      window.location.protocol === "file:"
        ? "http://127.0.0.1:5173"
        : "";

    const HISTORY_KEY = "listingProductHistory";
    const MAX_HISTORY = 30;

    const productNameInput = document.getElementById("productName");
    const sellingPointsInput = document.getElementById("sellingPoints");
    const categoryInput = document.getElementById("category");
    const productNameHistory = document.getElementById("productNameHistory");
    const categoryHistory = document.getElementById("categoryHistory");
    const historyChips = document.getElementById("historyChips");

    function loadProductHistory() {
      try {
        const data = JSON.parse(localStorage.getItem(HISTORY_KEY));
        return Array.isArray(data) ? data : [];
      } catch {
        return [];
      }
    }

    function saveProductHistory(entry) {
      const productName = entry.productName.trim();
      const sellingPoints = entry.sellingPoints.trim();
      const category = entry.category.trim();
      if (!productName || !sellingPoints || !category) return;

      const history = loadProductHistory().filter(
        (item) => item.productName !== productName
      );
      history.unshift({
        productName,
        sellingPoints,
        category,
        updatedAt: Date.now(),
      });
      localStorage.setItem(
        HISTORY_KEY,
        JSON.stringify(history.slice(0, MAX_HISTORY))
      );
      renderProductHistory();
    }

    function applyProductHistory(item) {
      if (!item) return;
      productNameInput.value = item.productName || "";
      sellingPointsInput.value = item.sellingPoints || "";
      categoryInput.value = item.category || "";
    }

    function findHistoryByName(name) {
      return loadProductHistory().find(
        (item) => item.productName === name.trim()
      );
    }

    function findHistoryByCategory(category) {
      return loadProductHistory().find(
        (item) => item.category === category.trim()
      );
    }

    function renderProductHistory() {
      const history = loadProductHistory();

      productNameHistory.innerHTML = "";
      categoryHistory.innerHTML = "";
      historyChips.innerHTML = "";

      const nameSet = new Set();
      const categorySet = new Set();

      history.forEach((item) => {
        if (!nameSet.has(item.productName)) {
          nameSet.add(item.productName);
          const option = document.createElement("option");
          option.value = item.productName;
          productNameHistory.appendChild(option);
        }

        if (!categorySet.has(item.category)) {
          categorySet.add(item.category);
          const option = document.createElement("option");
          option.value = item.category;
          categoryHistory.appendChild(option);
        }

        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "history-chip";
        chip.textContent = `${item.productName} · ${item.category}`;
        chip.title = "点击填充历史内容";
        chip.addEventListener("click", () => applyProductHistory(item));
        historyChips.appendChild(chip);
      });

      if (history.length === 0) {
        historyChips.innerHTML =
          '<span class="history-empty">暂无历史记录，生成一次后会自动保存</span>';
      }
    }

    function tryFillFromProductName() {
      const item = findHistoryByName(productNameInput.value);
      if (item) applyProductHistory(item);
    }

    function tryFillFromCategory() {
      const item = findHistoryByCategory(categoryInput.value);
      if (item) applyProductHistory(item);
    }

    productNameInput.addEventListener("change", tryFillFromProductName);
    productNameInput.addEventListener("input", () => {
      const item = findHistoryByName(productNameInput.value);
      if (item) applyProductHistory(item);
    });

    categoryInput.addEventListener("change", tryFillFromCategory);
    categoryInput.addEventListener("input", () => {
      const item = findHistoryByCategory(categoryInput.value);
      if (item) applyProductHistory(item);
    });

    renderProductHistory();

    function langInRegion(code, region) {
      if (region === "全部") return true;
      const meta = LANG_META[code];
      return meta?.continent === region || meta?.regions?.includes(region);
    }

    function getVisibleLanguageCodes() {
      return Object.keys(LANG_META).filter((code) => langInRegion(code, activeRegion));
    }

    function updateLangSectionLabel() {
      const total = Object.keys(LANG_META).length;
      const selected = getSelectedLanguages().length;
      langSectionLabel.textContent = `产品语言（已选 ${selected} / 共 ${total} 种）`;
    }

    function saveRegionSelection() {
      regionSelections[activeRegion] = new Set(selectedLangs);
    }

    function loadRegionSelection(region) {
      if (region === "全部") {
        selectedLangs = new Set();
        return;
      }
      if (regionSelections[region]) {
        selectedLangs = new Set(regionSelections[region]);
        return;
      }
      selectedLangs = new Set();
    }

    function setRegionFilter(region) {
      if (activeRegion !== "全部") {
        saveRegionSelection();
      }
      activeRegion = region;
      loadRegionSelection(region);
      if (region === "全部") {
        regionSelections["全部"] = new Set();
      }

      document.querySelectorAll("#regionFilters [data-region]").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.region === region);
      });

      renderLangGrid();
    }

    function renderLangGrid() {
      langGrid.innerHTML = "";
      const visibleCodes = getVisibleLanguageCodes();

      if (visibleCodes.length === 0) {
        langGrid.innerHTML = `<p class="lang-filter-hint">该大洲暂无可用语言</p>`;
        updateLangSectionLabel();
        return;
      }

      for (const code of visibleCodes) {
        const meta = LANG_META[code];
        const label = document.createElement("label");
        label.className = "lang-option";
        const input = document.createElement("input");
        input.type = "checkbox";
        input.name = "languages";
        input.value = code;
        input.checked = selectedLangs.has(code);
        input.addEventListener("change", () => {
          if (input.checked) selectedLangs.add(code);
          else selectedLangs.delete(code);
          saveRegionSelection();
          updateLangSectionLabel();
        });
        label.appendChild(input);
        label.append(` ${meta.flag} ${meta.name}`);
        langGrid.appendChild(label);
      }

      updateLangSectionLabel();
    }

    async function loadLanguages() {
      try {
        const response = await fetch(`${API_BASE}/api/languages`);
        const data = await response.json();
        LANG_META = data.languages || {};
      } catch {
        LANG_META = {
          en: { name: "英语", flag: "🇺🇸", marketplace: "Amazon US/UK", continent: "美洲" },
          de: { name: "德语", flag: "🇩🇪", marketplace: "Amazon DE", continent: "欧洲" },
          ja: { name: "日语", flag: "🇯🇵", marketplace: "Amazon JP", continent: "亚洲" },
        };
      }

      selectedLangs = new Set();
      regionSelections["全部"] = new Set();
      renderLangGrid();
    }

    document.querySelectorAll("#regionFilters [data-region]").forEach((btn) => {
      btn.addEventListener("click", () => setRegionFilter(btn.dataset.region));
    });

    loadLanguages();

    function getSelectedLanguages() {
      if (activeRegion === "全部") {
        return Object.keys(LANG_META).filter((code) => selectedLangs.has(code));
      }
      return getVisibleLanguageCodes().filter((code) => selectedLangs.has(code));
    }

    function calcTimeoutMs(langCount) {
      const batches = Math.ceil(langCount / 4);
      return batches * 95000 + 10000;
    }

    function showStatus(message, type = "error") {
      statusBar.textContent = message;
      statusBar.className = `status-bar visible ${type}`;
    }

    function hideStatus() {
      statusBar.textContent = "";
      statusBar.className = "status-bar";
    }

    async function checkServerHealth() {
      if (window.location.protocol === "file:") {
        showStatus(
          "检测到你是直接打开的 HTML 文件。请先双击 start.bat 启动服务器，再访问 http://127.0.0.1:5173",
          "error"
        );
        return false;
      }

      try {
        const response = await fetch(`${API_BASE}/api/health`, {
          method: "GET",
          cache: "no-store",
        });
        const data = await response.json();

        if (!response.ok) {
          showStatus("服务器异常，请重新运行 start.bat", "error");
          return false;
        }

        if (!data.hasApiKey) {
          showStatus("服务器已连接，但未配置 DEEPSEEK_API_KEY。请在 .env 文件中添加 Key 后重启。", "warn");
        } else {
          hideStatus();
        }
        return true;
      } catch {
        showStatus(
          "无法连接后端服务器。请确认 start.bat 窗口正在运行，并访问 http://127.0.0.1:5173（不要直接打开 HTML 文件）",
          "error"
        );
        return false;
      }
    }

    checkServerHealth();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const productName = document.getElementById("productName").value.trim();
      const sellingPoints = document.getElementById("sellingPoints").value.trim();
      const category = document.getElementById("category").value.trim();
      const style = document.querySelector('input[name="style"]:checked').value;
      const languages = getSelectedLanguages();

      if (!productName || !sellingPoints || !category) {
        alert("请填写完整的产品信息");
        return;
      }

      if (languages.length === 0) {
        alert("请至少选择一种产品语言");
        return;
      }

      if (!canGenerate()) {
        showUpgradeModal();
        return;
      }

      generateBtn.disabled = true;
      generateBtn.textContent = `生成中（${languages.length} 种语言，约 ${Math.ceil(languages.length / 4)} 批）...`;

      try {
        const timeoutMs = calcTimeoutMs(languages.length);
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

        const response = await fetch(`${API_BASE}/api/generate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ productName, sellingPoints, category, style, languages }),
          signal: controller.signal,
        });

        clearTimeout(timeoutId);

        let data = {};
        try {
          data = await response.json();
        } catch {
          throw new Error("服务器返回了无效数据，请确认 start.bat 正在运行");
        }

        if (!response.ok) {
          throw new Error(data.error || `请求失败 (${response.status})`);
        }

        currentListings = data.listings || data;
        addUsage();
        saveProductHistory({ productName, sellingPoints, category });
        renderResults(currentListings, languages);
        resultsSection.classList.add("visible");
        resultsSection.scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (error) {
        if (error.name === "AbortError") {
          const batches = Math.ceil(languages.length / 4);
          alert(`请求超时。当前 ${languages.length} 种语言、${batches} 批，请耐心等待或稍后重试`);
        } else if (
          error.message === "Failed to fetch" ||
          (error instanceof TypeError && !error.message)
        ) {
          alert(
            "无法连接服务器（Failed to fetch）。\n\n请按以下步骤操作：\n1. 双击 start.bat 启动\n2. 访问 http://127.0.0.1:5173\n3. 不要直接双击 index.html\n4. 保持黑色命令行窗口不要关闭"
          );
          showStatus("连接失败：请先运行 start.bat", "error");
        } else {
          alert(error.message || "生成失败，请稍后重试");
          showStatus(error.message || "生成失败", "error");
        }
      } finally {
        generateBtn.disabled = false;
        generateBtn.textContent = "生成 Listing";
      }
    });

    function switchLang(code) {
      activeLang = code;
      langTabs.querySelectorAll(".lang-tab").forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.lang === code);
      });
      langPanels.querySelectorAll(".lang-panel").forEach((panel) => {
        panel.classList.toggle("active", panel.dataset.lang === code);
      });
    }

    function renderResults(listings, languages) {
      langTabs.innerHTML = "";
      langPanels.innerHTML = "";

      languages.forEach((code, index) => {
        const listing = listings[code];
        if (!listing) return;

        const meta = LANG_META[code] || { name: code, flag: "🌐", marketplace: "" };

        const tab = document.createElement("button");
        tab.type = "button";
        tab.className = `lang-tab${index === 0 ? " active" : ""}`;
        tab.dataset.lang = code;
        tab.textContent = `${meta.flag} ${meta.name}`;
        tab.addEventListener("click", () => switchLang(code));
        langTabs.appendChild(tab);

        const panel = document.createElement("div");
        panel.className = `lang-panel${index === 0 ? " active" : ""}`;
        panel.dataset.lang = code;
        panel.innerHTML = `
          <p class="lang-panel-title">${meta.marketplace}</p>
          <div class="result-block">
            <div class="result-header">
              <span class="result-label">标题</span>
              <button class="btn-copy" data-lang="${code}" data-field="title">一键复制</button>
            </div>
            <p class="result-title"></p>
          </div>
          <div class="result-block">
            <div class="result-header">
              <span class="result-label">核心优势</span>
              <button class="btn-copy" data-lang="${code}" data-field="bullets">一键复制</button>
            </div>
            <ul class="bullet-list"></ul>
          </div>
          <div class="result-block">
            <div class="result-header">
              <span class="result-label">产品描述</span>
              <button class="btn-copy" data-lang="${code}" data-field="description">一键复制</button>
            </div>
            <div class="result-text desc result-html"></div>
          </div>
          <div class="result-block">
            <div class="result-header">
              <span class="result-label">关键词</span>
              <button class="btn-copy" data-lang="${code}" data-field="searchTerms">一键复制</button>
            </div>
            <p class="result-text terms"></p>
          </div>
        `;

        panel.querySelector(".result-title").textContent = listing.title || "";
        const bulletList = panel.querySelector(".bullet-list");
        (listing.bulletPoints || []).forEach((point) => {
          const li = document.createElement("li");
          li.textContent = point;
          bulletList.appendChild(li);
        });
        panel.querySelector(".desc").innerHTML = sanitizeDescriptionHtml(listing.description || "");
        panel.querySelector(".terms").textContent = listing.searchTerms || "";

        panel.querySelectorAll(".btn-copy").forEach((btn) => {
          btn.addEventListener("click", () => copyField(btn));
        });

        langPanels.appendChild(panel);
      });

      activeLang = languages[0];
    }

    function sanitizeDescriptionHtml(html) {
      return String(html)
        .replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, "")
        .replace(/<style\b[^<]*(?:(?!<\/style>)<[^<]*)*<\/style>/gi, "")
        .replace(/\son\w+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi, "");
    }

    async function copyField(button) {
      if (!currentListings) return;

      const { lang, field } = button.dataset;
      const listing = currentListings[lang];
      if (!listing) return;

      let text = "";
      switch (field) {
        case "title":
          text = listing.title || "";
          break;
        case "bullets":
          text = (listing.bulletPoints || []).join("\n");
          break;
        case "description":
          text = listing.description || "";
          break;
        case "searchTerms":
          text = listing.searchTerms || "";
          break;
      }

      try {
        await navigator.clipboard.writeText(text);
        const originalText = button.textContent;
        button.textContent = "已复制";
        button.classList.add("copied");
        setTimeout(() => {
          button.textContent = originalText;
          button.classList.remove("copied");
        }, 2000);
      } catch {
        alert("复制失败，请手动选择文本复制");
      }
    }
    function getRemaining() { return isPro() ? "∞" : Math.max(0, DAILY_LIMIT - getUsage()); }
    function updateUsageUI() {
      document.getElementById("remainingCount").textContent = getRemaining();
      if (isPro()) {
        document.getElementById("usageInfo").style.display = "none";
        document.getElementById("proBadge").style.display = "inline-block";
      } else {
        document.getElementById("usageInfo").style.display = "block";
        document.getElementById("proBadge").style.display = "none";
      }
    }
    function showUpgradeModal() { document.getElementById("upgradeOverlay").classList.add("show"); }
    function closeUpgradeModal() { document.getElementById("upgradeOverlay").classList.remove("show"); document.getElementById("activateSection").classList.remove("show"); document.getElementById("activateError").style.display="none"; }
    function showActivateInput() { document.getElementById("activateSection").classList.add("show"); }
    function goPay() { alert("请联系客服获取付费链接（微信：xlb_service）"); }
    function activatePro() { const code=document.getElementById("activateCodeInput").value.trim().toUpperCase(); if(ACTIVATION_CODES.includes(code)){localStorage.setItem(PRO_KEY,"true");closeUpgradeModal();updateUsageUI();alert("激活成功！你现在是 Pro 用户，无限使用！");}else{document.getElementById("activateError").style.display="block";} }
    updateUsageUI();

  </script>
</body>
</html>
