server {
    listen 80;
    server_name www.kjdsai.cn kjdsai.cn;

    # 若已在腾讯云申请了 SSL，可改为 listen 443 ssl 并配置证书路径
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/kjdsai.cn.pem;
    # ssl_certificate_key /etc/nginx/ssl/kjdsai.cn.key;

    client_max_body_size 1m;

    # 隐藏文件 / 敏感目录 / 源码配置，禁止外网直出
    location ~ /\. {
        deny all;
        return 404;
    }
    location ^~ /data/ {
        deny all;
        return 404;
    }
    location ^~ /scripts/ {
        deny all;
        return 404;
    }
    location ^~ /deploy/ {
        deny all;
        return 404;
    }
    location ^~ /node_modules/ {
        deny all;
        return 404;
    }
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
    location ~* \.(env|mjs|cjs|py|md|zip|docx|pptx)$ {
        deny all;
        return 404;
    }
    location = /package.json {
        deny all;
        return 404;
    }
    location = /package-lock.json {
        deny all;
        return 404;
    }
    location = /server.mjs {
        deny all;
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }
}
